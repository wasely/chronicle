<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronicle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface-2: #1e2230;
      --border: rgba(255,255,255,0.08);
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --accent: #6366f1;
      --danger: #ef4444;
      --success: #10b981;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      --radius: 24px;
      --mono: "DM Mono", monospace;
      --sans: "DM Sans", sans-serif;
      --work: #6366f1;
      --deep-work: #8b5cf6;
      --exercise: #10b981;
      --meals: #f59e0b;
      --rest: #3b82f6;
      --sleep: #1e3a5f;
      --learning: #06b6d4;
      --social: #f472b6;
      --admin: #94a3b8;
      --personal: #a78bfa;
      --glass: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: radial-gradient(circle at top, rgba(99,102,241,0.12), transparent 28%), var(--bg); color: var(--text); font-family: var(--sans); }
    button, input { font: inherit; }
    button { cursor: pointer; border: 0; background: none; color: inherit; }
    .mono { font-family: var(--mono); }
    .hidden { display: none !important; }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(139,92,246,0.06), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(6,182,212,0.08), transparent 25%);
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
    }

    .shell {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    .card {
      background: var(--glass), rgba(21,24,32,0.88);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .header {
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .header-top, .header-bottom {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(99,102,241,0.95), rgba(139,92,246,0.75));
      box-shadow: 0 0 28px rgba(99,102,241,0.45);
      position: relative;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px;
    }
    .brand-title {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      text-shadow: 0 0 30px rgba(99,102,241,0.35);
    }
    .brand-subtitle { color: var(--text-muted); font-size: 0.92rem; }

    .control-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .nav-cluster, .view-switch, .stat-pill, .chip {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
    }
    .nav-cluster, .view-switch { display: inline-flex; align-items: center; overflow: hidden; }
    .nav-btn, .view-btn, .icon-btn {
      padding: 10px 14px;
      color: var(--text);
      transition: background 180ms ease, transform 180ms ease;
    }
    .nav-btn:hover, .view-btn:hover, .icon-btn:hover, .chip:hover { background: rgba(255,255,255,0.06); }
    .view-btn.active, .chip.active { background: rgba(99,102,241,0.18); color: #fff; }
    .date-label {
      padding: 10px 16px;
      min-width: 160px;
      text-align: center;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .search {
      min-width: 220px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      outline: none;
    }
    .clock {
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      font-family: var(--mono);
      color: #c8d0ff;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }
    .stat-pill {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-label { color: var(--text-muted); font-size: 0.82rem; }
    .stat-value { font-weight: 700; letter-spacing: -0.03em; }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .chip {
      padding: 8px 12px;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 180ms ease;
    }
    .chip-dot {
      width: 8px; height: 8px; border-radius: 999px;
      box-shadow: 0 0 14px currentColor;
    }

    .content {
      min-height: 72vh;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .calendar-shell {
      position: relative;
      min-height: 680px;
      border-radius: 22px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
        rgba(10,12,18,0.36);
      border: 1px solid rgba(255,255,255,0.04);
    }

    .week-grid {
      display: grid;
      grid-template-columns: 72px repeat(7, 1fr);
      min-height: 100%;
    }
    .time-column, .day-column { position: relative; }
    .time-column {
      border-right: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
    }
    .day-column {
      border-right: 1px solid var(--border);
      cursor: pointer;
      transition: background 180ms ease, box-shadow 180ms ease;
    }
    .day-column:hover { background: rgba(255,255,255,0.02); }
    .day-column.today {
      background: linear-gradient(180deg, rgba(99,102,241,0.08), rgba(99,102,241,0.02));
      box-shadow: inset 0 0 0 1px rgba(99,102,241,0.4);
    }
    .day-header {
      height: 76px;
      padding: 14px 12px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(255,255,255,0.02);
      position: sticky;
      top: 0;
      z-index: 4;
    }
    .day-name { color: var(--text-muted); font-size: 0.84rem; }
    .day-number { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.03em; }

    .hour-slot {
      height: 64px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      position: relative;
    }
    .hour-slot::after {
      content: "";
      position: absolute;
      inset-inline: 0;
      top: 50%;
      border-top: 1px dashed rgba(255,255,255,0.03);
    }
    .hour-label {
      position: absolute;
      right: 12px;
      top: -10px;
      color: var(--text-muted);
      font-size: 0.76rem;
      font-family: var(--mono);
      background: rgba(13,15,20,0.85);
      padding: 2px 6px;
    }

    .timeline-body {
      position: relative;
      height: calc(64px * 18);
    }
    .activity-layer, .gap-layer, .now-layer {
      position: absolute;
      inset: 76px 0 0 0;
      pointer-events: none;
    }
    .activity-card {
      position: absolute;
      left: 8px;
      right: 8px;
      border-radius: 16px;
      padding: 10px 10px 8px;
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      overflow: hidden;
      pointer-events: auto;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 32px rgba(0,0,0,0.25);
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
    }
    .activity-card:hover { transform: translateY(-2px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 14px 32px rgba(0,0,0,0.34); }
    .activity-card.sleep {
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.18) 0 1px, transparent 2px),
        radial-gradient(circle at 75% 55%, rgba(255,255,255,0.16) 0 1px, transparent 2px),
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 70%);
      background-size: 32px 32px, 42px 42px, 100% 100%;
    }
    .activity-title { font-size: 0.86rem; font-weight: 700; line-height: 1.15; }
    .activity-meta { font-size: 0.74rem; opacity: 0.9; margin-top: 6px; font-family: var(--mono); }
    .gap-region {
      position: absolute;
      left: 12px; right: 12px;
      border-radius: 14px;
      border: 1px dashed rgba(255,255,255,0.08);
      background: repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0 8px, transparent 8px 16px);
      pointer-events: none;
    }
    .now-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(239,68,68,0.95), transparent);
      box-shadow: 0 0 18px rgba(239,68,68,0.6);
    }
    .now-line::before {
      content: "";
      position: absolute;
      left: 6px; top: -4px;
      width: 10px; height: 10px; border-radius: 999px;
      background: var(--danger);
      box-shadow: 0 0 14px rgba(239,68,68,0.8);
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 1px;
      background: rgba(255,255,255,0.04);
      border-radius: 20px;
      overflow: hidden;
    }
    .month-head, .month-cell {
      background: rgba(17,19,27,0.96);
      min-height: 120px;
      padding: 12px;
    }
    .month-head { min-height: auto; font-size: 0.84rem; color: var(--text-muted); font-weight: 700; }
    .month-cell {
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: background 180ms ease;
    }
    .month-cell:hover { background: rgba(24,28,40,0.96); }
    .month-cell.outside { opacity: 0.45; }
    .month-cell.today { box-shadow: inset 0 0 0 1px rgba(99,102,241,0.45); }
    .month-cell .day-top { display: flex; justify-content: space-between; align-items: center; }
    .hours-badge {
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      font-size: 0.72rem;
      font-family: var(--mono);
    }
    .dot-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .mini-dot { width: 8px; height: 8px; border-radius: 999px; }

    .day-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      min-height: 680px;
    }
    .day-summary {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .summary-block {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
    }
    .summary-title { font-size: 0.84rem; color: var(--text-muted); margin-bottom: 12px; }
    .donut-wrap { display: flex; align-items: center; justify-content: center; }
    .energy-bar {
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      display: flex;
    }
    .energy-segment { height: 100%; }

    #statsSidebar {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: transform 240ms ease, opacity 240ms ease;
      position: sticky;
      top: 24px;
      align-self: start;
      max-height: calc(100vh - 48px);
      overflow: auto;
    }
    #statsSidebar.collapsed { transform: translateX(110%); opacity: 0; pointer-events: none; }
    .sidebar-title { display: flex; justify-content: space-between; align-items: center; }
    .sidebar-title h2 { margin: 0; font-size: 1rem; letter-spacing: -0.03em; }
    .metric-grid { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .metric-card, .bar-list, .heatmap, .setup-panel, .detail-card {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }
    .metric-card .label, .bar-label, .legend, .setup-help { color: var(--text-muted); font-size: 0.82rem; }
    .metric-card .value { margin-top: 6px; font-weight: 700; letter-spacing: -0.03em; }
    .bar-row { display: grid; grid-template-columns: 92px 1fr auto; gap: 10px; align-items: center; margin-bottom: 10px; }
    .bar-track {
      width: 100%; height: 10px; border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 999px; }
    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }
    .heat-slot {
      height: 56px;
      border-radius: 14px;
      background: rgba(99,102,241,0.08);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .heat-slot::after {
      content: attr(data-label);
      position: absolute;
      left: 8px; bottom: 8px;
      font-size: 0.68rem;
      color: rgba(232,234,240,0.84);
      font-family: var(--mono);
    }

    #detailPanel {
      position: fixed;
      right: 18px;
      top: 18px;
      bottom: 18px;
      width: min(380px, calc(100vw - 36px));
      z-index: 20;
      transform: translateX(110%);
      transition: transform 260ms ease;
      pointer-events: none;
    }
    #detailPanel.open { transform: translateX(0); pointer-events: auto; }
    .detail-card {
      height: 100%;
      background: linear-gradient(180deg, rgba(30,34,48,0.96), rgba(21,24,32,0.96));
      box-shadow: var(--shadow);
      overflow: auto;
    }
    .detail-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; margin-bottom: 18px; }
    .detail-title { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.04em; }
    .detail-close {
      width: 34px; height: 34px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
    }
    .detail-grid { display: grid; gap: 12px; }
    .kv { padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
    .kv .key { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 6px; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(7,9,14,0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .setup-panel {
      width: min(560px, 100%);
      background: linear-gradient(180deg, rgba(30,34,48,0.96), rgba(21,24,32,0.96));
      box-shadow: var(--shadow);
    }
    .setup-grid { display: grid; gap: 12px; margin-top: 16px; }
    .field { display: grid; gap: 6px; }
    .field label { color: var(--text-muted); font-size: 0.84rem; }
    .field input {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 12px 14px;
      outline: none;
    }
    .setup-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .primary, .secondary {
      padding: 11px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
    }
    .primary { background: linear-gradient(135deg, rgba(99,102,241,0.95), rgba(139,92,246,0.9)); color: #fff; }
    .secondary { background: rgba(255,255,255,0.04); }
    .loading-skeleton {
      display: grid;
      gap: 14px;
    }
    .skeleton-row, .skeleton-card {
      border-radius: 18px;
      background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      background-size: 200% 100%;
      animation: shimmer 1.4s linear infinite;
    }
    .skeleton-row { height: 22px; }
    .skeleton-card { height: 140px; }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to { background-position: -200% 0; }
    }

    .tooltip {
      position: fixed;
      z-index: 25;
      padding: 10px 12px;
      max-width: 280px;
      border-radius: 14px;
      background: rgba(12,14,20,0.96);
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      pointer-events: none;
      font-size: 0.82rem;
      line-height: 1.45;
    }

    @media (max-width: 1200px) {
      .app { grid-template-columns: 1fr; }
      #statsSidebar { position: relative; top: auto; max-height: none; }
    }

    @media (max-width: 900px) {
      .day-layout { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: 1fr; }
      .header-top, .header-bottom { align-items: stretch; }
      .control-row { width: 100%; }
      .nav-cluster { width: 100%; justify-content: space-between; }
      .date-label { flex: 1; min-width: 0; }
      .search { flex: 1; min-width: 0; width: 100%; }
    }

    @media (max-width: 768px) {
      .app { padding: 14px; }
      .content { padding: 12px; }
      .calendar-shell { overflow: auto; }
      .week-grid { min-width: 860px; }
      .month-grid { min-width: 760px; }
      #detailPanel { left: 14px; right: 14px; width: auto; }
    }
  </style>
</head>
<body>
  <div id="setupModal"></div>
  <div class="app">
    <main class="shell">
      <section class="card header">
        <div class="header-top">
          <div class="brand">
            <div class="brand-mark"></div>
            <div>
              <div class="brand-title">Chronicle</div>
              <div class="brand-subtitle">Read-only Notion calendar for intentional days</div>
            </div>
          </div>
          <div class="control-row">
            <div class="nav-cluster">
              <button class="nav-btn" id="prevBtn">&#8592;</button>
              <button class="nav-btn" id="todayBtn">Today</button>
              <button class="nav-btn" id="nextBtn">&#8594;</button>
              <div class="date-label" id="rangeLabel"></div>
            </div>
            <div class="view-switch">
              <button class="view-btn active" data-view="week">Week</button>
              <button class="view-btn" data-view="day">Day</button>
              <button class="view-btn" data-view="month">Month</button>
            </div>
            <input class="search" id="searchInput" type="search" placeholder="Search activities">
            <button class="icon-btn nav-cluster" id="refreshBtn">Refresh</button>
            <div class="clock mono" id="liveClock">--:--</div>
          </div>
        </div>
        <div class="stats-bar">
          <div class="stat-pill"><div class="stat-label">Today's logged time</div><div class="stat-value" id="todayHours">0h 0m</div></div>
          <div class="stat-pill"><div class="stat-label">Current streak</div><div class="stat-value" id="streakValue">0 days</div></div>
          <div class="stat-pill"><div class="stat-label">Top category today</div><div class="stat-value" id="topCategoryValue">None</div></div>
        </div>
        <div class="header-bottom">
          <div class="filter-row" id="categoryFilters"></div>
          <div class="control-row">
            <button class="chip" id="sidebarToggle">Toggle Stats</button>
            <button class="chip" id="settingsBtn">Settings</button>
          </div>
        </div>
      </section>
      <section class="card content">
        <div id="loadingState"></div>
        <div id="viewRoot"></div>
      </section>
    </main>
  <aside class="card" id="statsSidebar"></aside>
  </div>
  <aside id="detailPanel"></aside>
  <div id="tooltip" class="tooltip hidden"></div>
  <script>
    const CATEGORY_META = {
      "Work": { color: "#6366f1", emoji: "💼" },
      "Deep Work": { color: "#8b5cf6", emoji: "🧠" },
      "Exercise": { color: "#10b981", emoji: "🏃" },
      "Meals": { color: "#f59e0b", emoji: "🍽️" },
      "Rest": { color: "#3b82f6", emoji: "🛋️" },
      "Sleep": { color: "#1e3a5f", emoji: "🌙" },
      "Learning": { color: "#06b6d4", emoji: "📚" },
      "Social": { color: "#f472b6", emoji: "👥" },
      "Admin": { color: "#94a3b8", emoji: "🗂️" },
      "Personal": { color: "#a78bfa", emoji: "✨" }
    };

    const state = {
      notionKey: localStorage.getItem("chronicle_notion_key") || "",
      databaseId: localStorage.getItem("chronicle_database_id") || "",
      notionVersion: localStorage.getItem("chronicle_notion_version") || "2022-06-28",
      view: "week",
      anchorDate: startOfDay(new Date()),
      selectedDate: startOfDay(new Date()),
      entries: [],
      filteredEntries: [],
      filters: new Set(),
      search: "",
      loading: false,
      sidebarOpen: true,
      autoRefreshHandle: null
    };

    const elements = {
      modal: document.getElementById("setupModal"),
      viewRoot: document.getElementById("viewRoot"),
      loadingState: document.getElementById("loadingState"),
      rangeLabel: document.getElementById("rangeLabel"),
      liveClock: document.getElementById("liveClock"),
      todayHours: document.getElementById("todayHours"),
      streakValue: document.getElementById("streakValue"),
      topCategoryValue: document.getElementById("topCategoryValue"),
      categoryFilters: document.getElementById("categoryFilters"),
      statsSidebar: document.getElementById("statsSidebar"),
      detailPanel: document.getElementById("detailPanel"),
      searchInput: document.getElementById("searchInput"),
      tooltip: document.getElementById("tooltip")
    };

    function startOfDay(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function startOfWeek(date) {
      const d = startOfDay(date);
      const day = (d.getDay() + 6) % 7;
      return addDays(d, -day);
    }

    function startOfMonth(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function endOfMonth(date) {
      return new Date(date.getFullYear(), date.getMonth() + 1, 0, 23, 59, 59, 999);
    }

    function fmt(date, options) {
      return new Intl.DateTimeFormat(undefined, options).format(date);
    }

    function formatDuration(minutes) {
      const total = Math.max(0, Math.round(minutes || 0));
      const h = Math.floor(total / 60);
      const m = total % 60;
      if (h && m) return h + "h " + m + "m";
      if (h) return h + "h";
      return m + "m";
    }

    function clamp(num, min, max) {
      return Math.min(max, Math.max(min, num));
    }

    function parseTags(raw) {
      if (!raw) return [];
      if (Array.isArray(raw)) return raw;
      return String(raw).split(",").map((tag) => tag.trim()).filter(Boolean);
    }

    function normalizeEntry(page) {
      const props = page.properties || {};
      const title = ((props.Title && props.Title.title) || []).map((item) => item.plain_text).join("") || "Untitled";
      const date = props.Date && props.Date.date ? props.Date.date : null;
      if (!date || !date.start) return null;
      const start = new Date(date.start);
      const end = new Date(date.end || date.start);
      const category = props.Category && props.Category.select ? props.Category.select.name : "Personal";
      const tags = props.Tags && props.Tags.multi_select ? props.Tags.multi_select.map((item) => item.name) : [];
      const energy = props["Energy Level"] && props["Energy Level"].select ? props["Energy Level"].select.name : "";
      const notes = ((props.Notes && props.Notes.rich_text) || []).map((item) => item.plain_text).join("");
      const duration = props.Duration && typeof props.Duration.number === "number"
        ? props.Duration.number
        : Math.max(0, Math.round((end - start) / 60000));
      const source = props.Source && props.Source.select ? props.Source.select.name : "";
      const dayRating = props["Day Rating"] ? props["Day Rating"].number : null;
      return {
        id: page.id,
        title,
        start,
        end,
        duration,
        category,
        tags,
        energy,
        notes,
        source,
        dayRating
      };
    }

    function visibleRange() {
      if (state.view === "week") {
        const start = startOfWeek(state.anchorDate);
        const end = addDays(start, 6);
        end.setHours(23, 59, 59, 999);
        return { start, end };
      }
      if (state.view === "day") {
        const start = startOfDay(state.selectedDate);
        const end = addDays(start, 1);
        end.setMilliseconds(-1);
        return { start, end };
      }
      const start = startOfWeek(startOfMonth(state.anchorDate));
      const monthEnd = endOfMonth(state.anchorDate);
      const end = addDays(start, 41);
      end.setHours(23, 59, 59, 999);
      return { start, end: end > monthEnd ? end : monthEnd };
    }

    function cacheKey() {
      const { start, end } = visibleRange();
      return "chronicle_cache_" + [state.databaseId, start.toISOString(), end.toISOString()].join("_");
    }

    function showLoading() {
      elements.loadingState.innerHTML = '<div class="loading-skeleton"><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-card"></div><div class="skeleton-card"></div></div>';
    }

    function hideLoading() {
      elements.loadingState.innerHTML = "";
    }

    async function fetchEntries(force = false) {
      if (!state.databaseId || !state.notionKey) {
        renderSetupModal();
        return;
      }

      const key = cacheKey();
      const { start, end } = visibleRange();
      const queryStart = addDays(start, -2);
      const queryEnd = addDays(end, 2);
      const cached = sessionStorage.getItem(key);
      if (cached && !force) {
        state.entries = JSON.parse(cached).map((entry) => ({ ...entry, start: new Date(entry.start), end: new Date(entry.end) }));
        applyFilters();
        render();
      }

      state.loading = true;
      showLoading();
      let hasMore = true;
      let cursor = null;
      const pages = [];

      try {
        while (hasMore) {
          const response = await fetch("https://api.notion.com/v1/databases/" + state.databaseId + "/query", {
            method: "POST",
            headers: {
              "Authorization": "Bearer " + state.notionKey,
              "Content-Type": "application/json",
              "Notion-Version": state.notionVersion
            },
            body: JSON.stringify({
                  start_cursor: cursor,
                  page_size: 100,
                  filter: {
                    and: [
                  { property: "Date", date: { on_or_before: queryEnd.toISOString() } },
                  { property: "Date", date: { on_or_after: queryStart.toISOString() } }
                    ]
                  },
              sorts: [{ property: "Date", direction: "ascending" }]
            })
          });

          if (!response.ok) {
            throw new Error("Notion request failed with status " + response.status);
          }

          const data = await response.json();
          pages.push(...data.results);
          hasMore = data.has_more;
          cursor = data.next_cursor;
        }

        state.entries = pages.map(normalizeEntry).filter(Boolean);
        sessionStorage.setItem(key, JSON.stringify(state.entries));
        applyFilters();
      } catch (error) {
        console.error(error);
        if (!cached) {
          elements.viewRoot.innerHTML = '<div class="setup-panel"><h3>Could not fetch from Notion</h3><p class="setup-help">' + escapeHtml(error.message) + '</p></div>';
        }
      } finally {
        state.loading = false;
        hideLoading();
        render();
      }
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function saveCredentials(key, databaseId, notionVersion) {
      state.notionKey = key.trim();
      state.databaseId = databaseId.trim();
      state.notionVersion = notionVersion.trim() || "2022-06-28";
      localStorage.setItem("chronicle_notion_key", state.notionKey);
      localStorage.setItem("chronicle_database_id", state.databaseId);
      localStorage.setItem("chronicle_notion_version", state.notionVersion);
    }

    function renderSetupModal() {
      const hidden = state.notionKey && state.databaseId ? "hidden" : "";
      elements.modal.className = hidden;
      elements.modal.innerHTML = '<div class="modal ' + hidden + '"><div class="setup-panel"><h2 style="margin:0 0 8px;">Connect Notion</h2><div class="setup-help">Chronicle fetches directly from your Notion database in the browser and stores credentials in localStorage on this device.</div><div class="setup-grid"><div class="field"><label>Notion API Key</label><input id="notionKeyInput" type="password" placeholder="secret_xxx" value="' + escapeHtml(state.notionKey) + '"></div><div class="field"><label>Database ID</label><input id="databaseIdInput" type="text" placeholder="32-char database id" value="' + escapeHtml(state.databaseId) + '"></div><div class="field"><label>Notion Version</label><input id="notionVersionInput" type="text" value="' + escapeHtml(state.notionVersion) + '"></div></div><div class="setup-actions"><button class="secondary" id="clearStorageBtn">Clear</button><button class="primary" id="saveCredentialsBtn">Save and Load</button></div></div></div>';

      const saveBtn = document.getElementById("saveCredentialsBtn");
      if (saveBtn) {
        saveBtn.onclick = () => {
          saveCredentials(
            document.getElementById("notionKeyInput").value,
            document.getElementById("databaseIdInput").value,
            document.getElementById("notionVersionInput").value
          );
          renderSetupModal();
          fetchEntries(true);
        };
      }
      const clearBtn = document.getElementById("clearStorageBtn");
      if (clearBtn) {
        clearBtn.onclick = () => {
          localStorage.removeItem("chronicle_notion_key");
          localStorage.removeItem("chronicle_database_id");
          localStorage.removeItem("chronicle_notion_version");
          state.notionKey = "";
          state.databaseId = "";
          state.notionVersion = "2022-06-28";
          renderSetupModal();
        };
      }
    }

    function byDay(entries) {
      const map = new Map();
      entries.forEach((entry) => {
        const key = startOfDay(entry.start).toISOString();
        const list = map.get(key) || [];
        list.push(entry);
        map.set(key, list);
      });
      return map;
    }

    function entriesForDay(day) {
      const start = startOfDay(day);
      const end = addDays(start, 1);
      return state.filteredEntries.filter((entry) => entry.start < end && entry.end > start);
    }

    function applyFilters() {
      state.filteredEntries = state.entries.filter((entry) => {
        const categoryMatch = state.filters.size === 0 || state.filters.has(entry.category);
        const haystack = (entry.title + " " + entry.notes + " " + entry.tags.join(" ")).toLowerCase();
        const searchMatch = !state.search || haystack.includes(state.search);
        return categoryMatch && searchMatch;
      });
    }

    function computeStats(periodEntries) {
      const categoryMinutes = {};
      let total = 0;
      let longest = null;
      let sleepTotal = 0;
      let sleepCount = 0;
      const hourly = new Array(24).fill(0);
      const energy = { Low: 0, Medium: 0, High: 0 };

      periodEntries.forEach((entry) => {
        if (entry.dayRating == null) {
          total += entry.duration;
          categoryMinutes[entry.category] = (categoryMinutes[entry.category] || 0) + entry.duration;
          if (!longest || entry.duration > longest.duration) longest = entry;
          if (entry.category === "Sleep") {
            sleepTotal += entry.duration;
            sleepCount += 1;
          }
          const cursor = new Date(entry.start);
          while (cursor < entry.end) {
            hourly[cursor.getHours()] += 1;
            cursor.setHours(cursor.getHours() + 1, 0, 0, 0);
          }
          if (entry.energy) energy[entry.energy] = (energy[entry.energy] || 0) + entry.duration;
        }
      });

      const topCategory = Object.entries(categoryMinutes).sort((a, b) => b[1] - a[1])[0] || null;
      const bestHourIndex = hourly.indexOf(Math.max(...hourly));
      return { total, categoryMinutes, topCategory, longest, sleepAverage: sleepCount ? Math.round(sleepTotal / sleepCount) : 0, hourly, bestHourIndex, energy };
    }

    function computeStreak() {
      const days = byDay(state.entries);
      let streak = 0;
      let cursor = startOfDay(new Date());
      while (true) {
        const items = days.get(cursor.toISOString()) || [];
        const minutes = items.filter((entry) => entry.dayRating == null).reduce((sum, entry) => sum + entry.duration, 0);
        if (minutes >= 240) {
          streak += 1;
          cursor = addDays(cursor, -1);
        } else {
          break;
        }
      }
      return streak;
    }

    function dayRating(dayEntries) {
      const ratings = dayEntries.filter((entry) => entry.dayRating != null).map((entry) => entry.dayRating);
      return ratings.length ? ratings[ratings.length - 1] : null;
    }

    function ratingTint(rating) {
      if (rating == null) return "transparent";
      const t = clamp((rating - 1) / 9, 0, 1);
      const red = Math.round(239 - 70 * t);
      const green = Math.round(68 + 120 * t);
      const blue = Math.round(68 + 40 * t);
      return "rgba(" + red + "," + green + "," + blue + ",0.12)";
    }

    function syncTopStats() {
      const todayEntries = entriesForDay(new Date());
      const todayStats = computeStats(todayEntries);
      elements.todayHours.textContent = formatDuration(todayStats.total);
      elements.streakValue.textContent = computeStreak() + " days";
      elements.topCategoryValue.textContent = todayStats.topCategory ? todayStats.topCategory[0] : "None";
    }

    function renderFilterChips() {
      elements.categoryFilters.innerHTML = Object.entries(CATEGORY_META).map(([category, meta]) => {
        const active = state.filters.has(category) ? "active" : "";
        return '<button class="chip ' + active + '" data-category="' + category + '" style="color:' + meta.color + '"><span class="chip-dot" style="background:' + meta.color + '"></span>' + escapeHtml(category) + "</button>";
      }).join("");
      elements.categoryFilters.querySelectorAll("[data-category]").forEach((button) => {
        button.onclick = () => {
          const category = button.dataset.category;
          if (state.filters.has(category)) state.filters.delete(category);
          else state.filters.add(category);
          applyFilters();
          render();
        };
      });
    }

    function updateRangeLabel() {
      if (state.view === "week") {
        const start = startOfWeek(state.anchorDate);
        const end = addDays(start, 6);
        elements.rangeLabel.textContent = fmt(start, { month: "short", day: "numeric" }) + " – " + fmt(end, { month: "short", day: "numeric" });
      } else if (state.view === "day") {
        elements.rangeLabel.textContent = fmt(state.selectedDate, { weekday: "long", month: "long", day: "numeric" });
      } else {
        elements.rangeLabel.textContent = fmt(state.anchorDate, { month: "long", year: "numeric" });
      }
    }

    function injectGaps(container, entries, startHour, endHour, pxPerHour) {
      const dayStart = startHour * 60;
      const dayEnd = endHour * 60;
      const sorted = [...entries].sort((a, b) => a.start - b.start);
      let cursor = dayStart;
      sorted.forEach((entry) => {
        const start = entry.start.getHours() * 60 + entry.start.getMinutes();
        if (start - cursor >= 90) {
          container.appendChild(buildGap(cursor, start, startHour, pxPerHour));
        }
        const end = entry.end.getHours() * 60 + entry.end.getMinutes();
        cursor = Math.max(cursor, end);
      });
      if (dayEnd - cursor >= 90) {
        container.appendChild(buildGap(cursor, dayEnd, startHour, pxPerHour));
      }
    }

    function buildGap(startMinutes, endMinutes, startHour, pxPerHour) {
      const gap = document.createElement("div");
      gap.className = "gap-region";
      gap.style.top = ((startMinutes / 60 - startHour) * pxPerHour) + "px";
      gap.style.height = (((endMinutes - startMinutes) / 60) * pxPerHour) + "px";
      return gap;
    }

    function hexToRgba(hex, alpha) {
      const sanitized = hex.replace("#", "");
      const bigint = parseInt(sanitized, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
    }

    function buildActivityBlock(entry, day, startHour, endHour, pxPerHour, expanded) {
      const meta = CATEGORY_META[entry.category] || CATEGORY_META.Personal;
      const dayWindowStart = new Date(day.getFullYear(), day.getMonth(), day.getDate(), startHour);
      const dayWindowEnd = new Date(day.getFullYear(), day.getMonth(), day.getDate(), endHour);
      const visibleStart = new Date(Math.max(entry.start, dayWindowStart));
      const visibleEnd = new Date(Math.min(entry.end, dayWindowEnd));
      const top = (visibleStart.getHours() + visibleStart.getMinutes() / 60 - startHour) * pxPerHour;
      const height = Math.max(expanded ? 54 : 44, ((visibleEnd - visibleStart) / 3600000) * pxPerHour);
      const block = document.createElement("button");
      block.className = "activity-card" + (entry.category === "Sleep" ? " sleep" : "");
      block.style.top = top + "px";
      block.style.height = height + "px";
      block.style.background = "linear-gradient(180deg, " + hexToRgba(meta.color, 0.78) + ", " + hexToRgba(meta.color, 0.56) + ")";
      block.innerHTML = '<div class="activity-title">' + meta.emoji + " " + escapeHtml(entry.title) + '</div><div class="activity-meta">' + formatDuration(entry.duration) + " · " + escapeHtml(entry.category) + "</div>";
      block.onmouseenter = (event) => showTooltip(event, entry);
      block.onmousemove = moveTooltip;
      block.onmouseleave = hideTooltip;
      block.onclick = (event) => {
        event.stopPropagation();
        renderDetailPanel(entry);
      };
      return block;
    }

    function renderWeekView() {
      const weekStart = startOfWeek(state.anchorDate);
      const days = Array.from({ length: 7 }, (_, index) => addDays(weekStart, index));
      const pxPerHour = 64;
      const startHour = 6;
      const endHour = 24;
      const timeColumn = '<div class="time-column"><div class="day-header"></div><div class="timeline-body">' + Array.from({ length: endHour - startHour }, (_, i) => {
        const hour = i + startHour;
        return '<div class="hour-slot"><div class="hour-label">' + String(hour).padStart(2, "0") + ":00</div></div>";
      }).join("") + "</div></div>";

      const dayColumns = days.map((day) => {
        const today = startOfDay(new Date()).getTime() === startOfDay(day).getTime() ? "today" : "";
        return '<div class="day-column ' + today + '" data-day="' + day.toISOString() + '"><div class="day-header"><div class="day-name">' + fmt(day, { weekday: "short" }) + '</div><div class="day-number">' + fmt(day, { month: "short", day: "numeric" }) + '</div></div><div class="timeline-body">' + Array.from({ length: endHour - startHour }, () => '<div class="hour-slot"></div>').join("") + "</div></div>";
      }).join("");

      elements.viewRoot.innerHTML = '<div class="calendar-shell"><div class="week-grid">' + timeColumn + dayColumns + "</div></div>";
      elements.viewRoot.querySelectorAll(".day-column").forEach((column) => {
        const day = new Date(column.dataset.day);
        column.onclick = () => {
          state.selectedDate = startOfDay(day);
          state.view = "day";
          updateViewButtons();
          render();
        };
        const body = column.querySelector(".timeline-body");
        const dayEntries = entriesForDay(day).filter((entry) => entry.dayRating == null);
        injectGaps(body, dayEntries, startHour, endHour, pxPerHour);
        dayEntries.forEach((entry) => body.appendChild(buildActivityBlock(entry, day, startHour, endHour, pxPerHour, false)));
        if (startOfDay(day).getTime() === startOfDay(new Date()).getTime()) {
          const line = document.createElement("div");
          line.className = "now-line";
          line.style.top = ((new Date().getHours() + new Date().getMinutes() / 60 - startHour) * pxPerHour) + "px";
          body.appendChild(line);
        }
      });
    }

    function buildDonut(stats) {
      const total = Object.values(stats.categoryMinutes).reduce((sum, value) => sum + value, 0) || 1;
      let offset = 0;
      const circles = Object.entries(stats.categoryMinutes).map(([category, minutes]) => {
        const portion = minutes / total;
        const dash = portion * 314;
        const meta = CATEGORY_META[category] || CATEGORY_META.Personal;
        const circle = '<circle cx="70" cy="70" r="50" fill="none" stroke="' + meta.color + '" stroke-width="16" stroke-linecap="round" stroke-dasharray="' + dash + ' 314" stroke-dashoffset="' + (-offset) + '" transform="rotate(-90 70 70)"></circle>';
        offset += dash;
        return circle;
      }).join("");
      return '<svg width="140" height="140" viewBox="0 0 140 140"><circle cx="70" cy="70" r="50" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="16"></circle>' + circles + '<text x="70" y="66" text-anchor="middle" fill="#e8eaf0" font-size="18" font-family="DM Sans" font-weight="700">' + formatDuration(stats.total) + '</text><text x="70" y="86" text-anchor="middle" fill="#6b7280" font-size="11" font-family="DM Sans">tracked</text></svg>';
    }

    function renderDayView() {
      const day = state.selectedDate;
      const pxPerHour = 72;
      const startHour = 0;
      const endHour = 24;
      const entries = entriesForDay(day).filter((entry) => entry.dayRating == null);
      const stats = computeStats(entries);
      const rating = dayRating(entriesForDay(day));

      elements.viewRoot.innerHTML = '<div class="day-layout"><div class="calendar-shell" id="dayTimeline"></div><div class="day-summary"><div class="summary-block"><div class="summary-title">Day snapshot</div><div style="font-size:1.6rem;font-weight:800;letter-spacing:-0.05em;">' + formatDuration(stats.total) + '</div><div class="legend">Logged on ' + escapeHtml(fmt(day, { weekday: "long", month: "long", day: "numeric" })) + '</div></div><div class="summary-block"><div class="summary-title">Category balance</div><div class="donut-wrap">' + buildDonut(stats) + '</div></div><div class="summary-block"><div class="summary-title">Energy timeline</div><div class="energy-bar">' + buildEnergySegments(stats.energy) + '</div></div><div class="summary-block"><div class="summary-title">Day rating</div><div style="font-size:1.4rem;font-weight:800;">' + (rating != null ? rating + "/10" : "Not rated") + '</div></div></div></div>';

      const timeline = document.getElementById("dayTimeline");
      timeline.innerHTML = '<div class="week-grid" style="grid-template-columns:72px 1fr;"><div class="time-column"><div class="day-header"></div><div class="timeline-body">' + Array.from({ length: 24 }, (_, i) => '<div class="hour-slot"><div class="hour-label">' + String(i).padStart(2, "0") + ':00</div></div>').join("") + '</div></div><div class="day-column today" style="cursor:default;"><div class="day-header"><div class="day-name">' + fmt(day, { weekday: "long" }) + '</div><div class="day-number">' + fmt(day, { month: "short", day: "numeric" }) + '</div></div><div class="timeline-body">' + Array.from({ length: 24 }, () => '<div class="hour-slot"></div>').join("") + '</div></div></div>';
      const body = timeline.querySelector(".day-column .timeline-body");
      injectGaps(body, entries, startHour, endHour, pxPerHour);
      entries.forEach((entry) => body.appendChild(buildActivityBlock(entry, day, startHour, endHour, pxPerHour, true)));
      if (startOfDay(day).getTime() === startOfDay(new Date()).getTime()) {
        const line = document.createElement("div");
        line.className = "now-line";
        line.style.top = ((new Date().getHours() + new Date().getMinutes() / 60) * pxPerHour) + "px";
        body.appendChild(line);
      }
    }

    function buildEnergySegments(energy) {
      const total = Object.values(energy).reduce((sum, value) => sum + value, 0) || 1;
      const colors = { Low: "#3b82f6", Medium: "#f59e0b", High: "#10b981" };
      return Object.entries(energy).map(([label, minutes]) => '<div class="energy-segment" title="' + label + ": " + formatDuration(minutes) + '" style="width:' + ((minutes / total) * 100) + "%;background:" + colors[label] + ';"></div>').join("");
    }

    function renderMonthView() {
      const monthStart = startOfMonth(state.anchorDate);
      const gridStart = startOfWeek(monthStart);
      const cells = Array.from({ length: 42 }, (_, index) => addDays(gridStart, index));
      const dayMap = byDay(state.filteredEntries);
      const headers = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"].map((label) => '<div class="month-head">' + label + '</div>').join("");
      const content = cells.map((day) => {
        const key = startOfDay(day).toISOString();
        const entries = (dayMap.get(key) || []).filter((entry) => entry.dayRating == null);
        const hours = entries.reduce((sum, entry) => sum + entry.duration, 0);
        const rating = dayRating(dayMap.get(key) || []);
        const outside = day.getMonth() !== state.anchorDate.getMonth() ? "outside" : "";
        const today = startOfDay(day).getTime() === startOfDay(new Date()).getTime() ? "today" : "";
        const dots = entries.slice(0, 6).map((entry) => '<span class="mini-dot" style="background:' + (CATEGORY_META[entry.category] || CATEGORY_META.Personal).color + '"></span>').join("");
        const more = entries.length > 6 ? '<span class="legend">+' + (entries.length - 6) + " more</span>" : "";
        return '<div class="month-cell ' + outside + " " + today + '" data-day="' + day.toISOString() + '" style="background:' + ratingTint(rating) + ';"><div class="day-top"><strong>' + day.getDate() + '</strong><span class="hours-badge">' + formatDuration(hours) + '</span></div><div class="dot-row">' + dots + '</div>' + more + "</div>";
      }).join("");
      elements.viewRoot.innerHTML = '<div class="month-grid">' + headers + content + "</div>";
      elements.viewRoot.querySelectorAll(".month-cell").forEach((cell) => {
        cell.onclick = () => {
          state.selectedDate = startOfDay(new Date(cell.dataset.day));
          state.view = "day";
          updateViewButtons();
          render();
        };
      });
    }

    function renderStatsSidebar() {
      const currentRange = visibleRange();
      const currentEntries = state.filteredEntries.filter((entry) => entry.start <= currentRange.end && entry.end >= currentRange.start && entry.dayRating == null);
      const currentStats = computeStats(currentEntries);
      const previousStart = addDays(currentRange.start, state.view === "month" ? -30 : -7);
      const previousEnd = addDays(currentRange.end, state.view === "month" ? -30 : -7);
      const previousEntries = state.entries.filter((entry) => entry.start <= previousEnd && entry.end >= previousStart && entry.dayRating == null);
      const previousStats = computeStats(previousEntries);
      const delta = currentStats.total - previousStats.total;
      const breakdownBars = Object.entries(currentStats.categoryMinutes).sort((a, b) => b[1] - a[1]).map(([category, minutes]) => {
        const pct = currentStats.total ? (minutes / currentStats.total) * 100 : 0;
        const meta = CATEGORY_META[category] || CATEGORY_META.Personal;
        return '<div class="bar-row"><div class="bar-label">' + escapeHtml(category) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + "%;background:" + meta.color + ';"></div></div><div class="legend mono">' + formatDuration(minutes) + "</div></div>";
      }).join("") || '<div class="legend">No activity in this range.</div>';

      const heat = currentStats.hourly.map((value, index) => {
        const intensity = Math.max(0.08, value / Math.max(1, ...currentStats.hourly));
        return '<div class="heat-slot" data-label="' + String(index).padStart(2, "0") + '" style="background:' + hexToRgba("#6366f1", intensity) + ';"></div>';
      }).join("");

      elements.statsSidebar.className = "card" + (state.sidebarOpen ? "" : " collapsed");
      elements.statsSidebar.innerHTML = '<div class="sidebar-title"><h2>Period intelligence</h2><button class="chip" id="collapseSidebarBtn">' + (state.sidebarOpen ? "Hide" : "Show") + '</button></div><div class="metric-grid"><div class="metric-card"><div class="label">This period vs previous</div><div class="value">' + (delta >= 0 ? "+" : "") + formatDuration(delta) + '</div></div><div class="metric-card"><div class="label">Most productive hour</div><div class="value">' + String(currentStats.bestHourIndex).padStart(2, "0") + ':00</div></div><div class="metric-card"><div class="label">Longest focus block</div><div class="value">' + (currentStats.longest ? escapeHtml(currentStats.longest.title.slice(0, 22)) + " · " + formatDuration(currentStats.longest.duration) : "None") + '</div></div><div class="metric-card"><div class="label">Sleep average</div><div class="value">' + formatDuration(currentStats.sleepAverage) + '</div></div></div><div class="heatmap"><div class="summary-title">Time-of-day heatmap</div><div class="heatmap-grid">' + heat + '</div></div><div class="bar-list"><div class="summary-title">Category breakdown</div>' + breakdownBars + "</div>";
      const collapseButton = document.getElementById("collapseSidebarBtn");
      if (collapseButton) collapseButton.onclick = () => {
        state.sidebarOpen = !state.sidebarOpen;
        renderStatsSidebar();
      };
    }

    function renderDetailPanel(entry) {
      const meta = CATEGORY_META[entry.category] || CATEGORY_META.Personal;
      elements.detailPanel.className = "open";
      elements.detailPanel.innerHTML = '<div class="detail-card"><div class="detail-head"><div><div class="detail-title">' + meta.emoji + " " + escapeHtml(entry.title) + '</div><div class="legend">' + escapeHtml(entry.category) + "</div></div><button class=\"detail-close\" id=\"detailCloseBtn\">✕</button></div><div class=\"detail-grid\"><div class=\"kv\"><div class=\"key\">Time</div><div>" + fmt(entry.start, { weekday: "short", hour: "numeric", minute: "2-digit" }) + " → " + fmt(entry.end, { hour: "numeric", minute: "2-digit" }) + '</div></div><div class="kv"><div class="key">Duration</div><div class="mono">' + formatDuration(entry.duration) + '</div></div><div class="kv"><div class="key">Energy</div><div>' + (entry.energy || "Unknown") + '</div></div><div class="kv"><div class="key">Tags</div><div>' + (entry.tags.length ? escapeHtml(entry.tags.join(", ")) : "None") + '</div></div><div class="kv"><div class="key">Source</div><div>' + escapeHtml(entry.source || "Unknown") + '</div></div><div class="kv"><div class="key">Notes</div><div>' + (entry.notes ? escapeHtml(entry.notes) : "No notes") + "</div></div></div></div>";
      document.getElementById("detailCloseBtn").onclick = closeDetailPanel;
    }

    function closeDetailPanel() {
      elements.detailPanel.className = "";
      elements.detailPanel.innerHTML = "";
    }

    function showTooltip(event, entry) {
      const meta = CATEGORY_META[entry.category] || CATEGORY_META.Personal;
      elements.tooltip.innerHTML = '<strong>' + meta.emoji + " " + escapeHtml(entry.title) + '</strong><br>' + fmt(entry.start, { weekday: "short", hour: "numeric", minute: "2-digit" }) + " → " + fmt(entry.end, { hour: "numeric", minute: "2-digit" }) + '<br>' + formatDuration(entry.duration) + " · " + escapeHtml(entry.category) + '<br>' + (entry.tags.length ? "Tags: " + escapeHtml(entry.tags.join(", ")) + "<br>" : "") + (entry.energy ? "Energy: " + escapeHtml(entry.energy) + "<br>" : "") + (entry.notes ? escapeHtml(entry.notes) : "");
      elements.tooltip.classList.remove("hidden");
      moveTooltip(event);
    }

    function moveTooltip(event) {
      elements.tooltip.style.left = Math.min(window.innerWidth - 300, event.clientX + 18) + "px";
      elements.tooltip.style.top = Math.min(window.innerHeight - 160, event.clientY + 18) + "px";
    }

    function hideTooltip() {
      elements.tooltip.classList.add("hidden");
    }

    function updateViewButtons() {
      document.querySelectorAll(".view-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === state.view);
      });
    }

    function render() {
      updateRangeLabel();
      syncTopStats();
      renderFilterChips();
      renderStatsSidebar();
      if (state.view === "week") renderWeekView();
      else if (state.view === "day") renderDayView();
      else renderMonthView();
    }

    function navigate(direction) {
      if (state.view === "week") state.anchorDate = addDays(state.anchorDate, direction * 7);
      else if (state.view === "day") state.selectedDate = addDays(state.selectedDate, direction);
      else state.anchorDate = new Date(state.anchorDate.getFullYear(), state.anchorDate.getMonth() + direction, 1);
      fetchEntries(true);
    }

    function jumpToday() {
      state.anchorDate = startOfDay(new Date());
      state.selectedDate = startOfDay(new Date());
      fetchEntries(true);
    }

    function attachEvents() {
      document.getElementById("prevBtn").onclick = () => navigate(-1);
      document.getElementById("nextBtn").onclick = () => navigate(1);
      document.getElementById("todayBtn").onclick = jumpToday;
      document.getElementById("refreshBtn").onclick = () => fetchEntries(true);
      document.getElementById("settingsBtn").onclick = () => {
        elements.modal.className = "";
        renderSetupModal();
      };
      document.getElementById("sidebarToggle").onclick = () => {
        state.sidebarOpen = !state.sidebarOpen;
        renderStatsSidebar();
      };
      elements.searchInput.oninput = (event) => {
        state.search = event.target.value.trim().toLowerCase();
        applyFilters();
        render();
      };
      document.querySelectorAll(".view-btn").forEach((button) => {
        button.onclick = () => {
          state.view = button.dataset.view;
          if (state.view === "day") state.selectedDate = startOfDay(state.selectedDate || new Date());
          updateViewButtons();
          fetchEntries(true);
        };
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") navigate(-1);
        if (event.key === "ArrowRight") navigate(1);
        if (event.key.toLowerCase() === "w") { state.view = "week"; updateViewButtons(); fetchEntries(true); }
        if (event.key.toLowerCase() === "d") { state.view = "day"; updateViewButtons(); fetchEntries(true); }
        if (event.key.toLowerCase() === "m") { state.view = "month"; updateViewButtons(); fetchEntries(true); }
        if (event.key.toLowerCase() === "t") jumpToday();
        if (event.key === "Escape") closeDetailPanel();
      });
    }

    function startClock() {
      const tick = () => {
        elements.liveClock.textContent = fmt(new Date(), { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      };
      tick();
      setInterval(tick, 1000);
    }

    function startAutoRefresh() {
      clearInterval(state.autoRefreshHandle);
      state.autoRefreshHandle = setInterval(() => fetchEntries(true), 5 * 60 * 1000);
    }

    attachEvents();
    startClock();
    renderSetupModal();
    updateViewButtons();
    fetchEntries(false);
    startAutoRefresh();
  </script>
</body>
</html>
